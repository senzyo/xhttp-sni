# 拒绝所有未定义的访问 (HTTP)
server {
    listen                  80 default_server;
    listen                  [::]:80 default_server;
    server_name             "";
    return                  444;
}
# 拒绝所有未定义的访问 (HTTPS)
server {
    listen                  unix:/dev/shm/nginx/default_backend.sock ssl proxy_protocol default_server;
    set_real_ip_from        unix:;
    real_ip_header          proxy_protocol;
    ssl_reject_handshake    on;
    return                  444;
}