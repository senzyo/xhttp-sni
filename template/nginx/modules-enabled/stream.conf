stream {
    map $ssl_preread_server_name $tcp_sni {
        <Reality_Site>       nginx_to_xray_reality;
        <XHTTP_CDN_Site>     cdn_to_nginx;
        default              default_backend;
    }

    upstream nginx_to_xray_reality {
        server               unix:/dev/shm/nginx/nginx_to_xray_reality.sock;
    }

    upstream cdn_to_nginx {
        server               unix:/dev/shm/nginx/cdn_to_nginx.sock;
    }

    upstream default_backend {
        server               unix:/dev/shm/nginx/default_backend.sock;
    }

    server {
        listen               443 reuseport;
        listen               [::]:443 reuseport;
        ssl_preread          on;
        proxy_protocol       on;
        proxy_pass           $tcp_sni;
    }
}
